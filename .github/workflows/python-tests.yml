name: Test package

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        python-version: ["3.10.15", "3.11", "3.12", "3.13"]
        os:
          - "ubuntu-latest"
          - "windows-latest"
          - "macos-latest"
    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for hatch-vcs to determine version

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6

      - name: Install the project
        run: uv sync --python ${{ matrix.python-version }} --extra pyside6

      - name: Set up virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-x11-0 libegl1

      - name: Lint
        run: uv tool run ruff check --output-format=github src

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run --python ${{ matrix.python-version }} pytest tests
